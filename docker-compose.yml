services:
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: docsearch-opensearch
    environment:
      - cluster.name=docsearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: docsearch-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: docsearch-postgres
    environment:
      POSTGRES_DB: docsearch
      POSTGRES_USER: docsearch
      POSTGRES_PASSWORD: docsearch
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsearch"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: docsearch-api
    depends_on:
      opensearch: { condition: service_healthy }
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: docsearch
      POSTGRES_USER: docsearch
      POSTGRES_PASSWORD: docsearch
    ports:
      - "8080:8080"

volumes:
  opensearch-data:
  postgres-data:
